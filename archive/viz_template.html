<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Hashtag Co-occurrence Network — Group 4 (draft)</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #111419; color: #e8e8e8; overflow: hidden; }
  #wrap { display: flex; height: 100%; }
  #graph { flex: 1; cursor: grab; }
  #side { width: 290px; border-left: 1px solid #2a2f38; padding: 14px 16px; overflow-y: auto; background: #161a21; }
  h1 { font-size: 15px; margin: 0 0 2px; font-weight: 600; }
  .sub { font-size: 11px; color: #8a93a3; margin-bottom: 12px; }
  .ctl { font-size: 11px; color: #b6bec d; margin: 10px 0 4px; }
  .ctl label { display: block; color: #8a93a3; margin-bottom: 3px; }
  input[type=range] { width: 100%; }
  #legend div { font-size: 11px; margin: 2px 0; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
  #legend div.off { opacity: 0.3; }
  .sw { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  #detail { margin-top: 14px; border-top: 1px solid #2a2f38; padding-top: 10px; font-size: 12px; }
  #detail h2 { font-size: 14px; margin: 0 0 6px; color: #fff; }
  #detail .stat { color: #8a93a3; margin: 2px 0; }
  #detail .stat b { color: #e8e8e8; font-weight: 600; }
  #neigh { margin-top: 8px; }
  #neigh div { padding: 2px 0; cursor: pointer; color: #9fc1ff; }
  #neigh div:hover { text-decoration: underline; }
  #neigh span { color: #5b6470; font-size: 10px; }
  #tooltip { position: fixed; pointer-events: none; background: #1d232e; border: 1px solid #39424f;
             padding: 7px 10px; border-radius: 6px; font-size: 11px; display: none; z-index: 10; max-width: 220px; }
  #tooltip b { font-size: 12px; }
  button { background: #232a35; color: #cfd6e0; border: 1px solid #39424f; border-radius: 5px;
           padding: 4px 10px; font-size: 11px; cursor: pointer; margin-top: 10px; }
  button:hover { background: #2c3543; }
  .hint { font-size: 10px; color: #5b6470; margin-top: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div id="wrap">
  <svg id="graph"></svg>
  <div id="side">
    <h1>TikTok hashtag network</h1>
    <div class="sub">209,543 videos · Jun–Nov 2024 · top 200 hashtags<br>node = hashtag · edge = used in same video</div>
    <div class="ctl">
      <label>Min co-occurrence: <span id="wval"></span> videos</label>
      <input type="range" id="wmin" min="15" max="150" step="5" value="25">
    </div>
    <div class="ctl">
      <label>Node size</label>
      <select id="sizeBy" style="width:100%; background:#232a35; color:#cfd6e0; border:1px solid #39424f; border-radius:5px; padding:3px;">
        <option value="count"># videos using the tag</option>
        <option value="total_views">total views</option>
        <option value="median_views">median views</option>
      </select>
    </div>
    <div class="ctl"><label>Topics (click to toggle)</label><div id="legend"></div></div>
    <button id="reset">Reset view</button>
    <div id="detail"><div class="stat" style="margin-top:4px">Click a hashtag to inspect its neighbourhood.</div></div>
    <div class="hint">Drag nodes · scroll to zoom · drag background to pan.<br>Draft prototype — Assignment 3, Group 4.</div>
  </div>
</div>
<div id="tooltip"></div>
<script>
const DATA = __DATA__;

const TOPIC_COLORS = {
  "Beauty_Fashion": "#e377c2", "Cooking_Food": "#ff9f1c", "Dance_Music": "#a78bfa",
  "Life_hacks_Personal_growth": "#34d399", "Lifestyle": "#22d3ee", "Movies_TV_Books": "#f87171",
  "Sports_Fitness": "#60a5fa", "Gaming": "#fbbf24", "Others": "#9ca3af"
};
const fmt = d3.format(".2s");

const svg = d3.select("#graph");
const W = () => svg.node().clientWidth, H = () => svg.node().clientHeight;
const g = svg.append("g");
const linkG = g.append("g"), nodeG = g.append("g"), labelG = g.append("g");
const tooltip = d3.select("#tooltip");

svg.call(d3.zoom().scaleExtent([0.2, 6]).on("zoom", e => g.attr("transform", e.transform)));

const topics = [...new Set(DATA.nodes.map(d => d.topic))].sort();
const activeTopics = new Set(topics);

// legend
d3.select("#legend").selectAll("div").data(topics).join("div")
  .html(t => `<span class="sw" style="background:${TOPIC_COLORS[t] || "#999"}"></span>${t.replaceAll("_"," ")}`)
  .on("click", function (e, t) {
    activeTopics.has(t) ? activeTopics.delete(t) : activeTopics.add(t);
    d3.select(this).classed("off", !activeTopics.has(t));
    update();
  });

let sim, selected = null;

function update() {
  const wmin = +d3.select("#wmin").property("value");
  d3.select("#wval").text(wmin);
  const sizeBy = d3.select("#sizeBy").property("value");

  const nodes = DATA.nodes.filter(d => activeTopics.has(d.topic)).map(d => Object.assign({}, d));
  const ids = new Set(nodes.map(d => d.id));
  const links = DATA.links
    .filter(l => l.weight >= wmin && ids.has(l.source.id || l.source) && ids.has(l.target.id || l.target))
    .map(l => ({ source: l.source.id || l.source, target: l.target.id || l.target, weight: l.weight }));

  // drop isolated nodes
  const linked = new Set(links.flatMap(l => [l.source, l.target]));
  const shown = nodes.filter(d => linked.has(d.id));

  const rScale = d3.scaleSqrt()
    .domain([0, d3.max(shown, d => d[sizeBy]) || 1]).range([3, 26]);
  const wScale = d3.scaleLinear()
    .domain(d3.extent(links, l => l.weight)).range([0.4, 5]);

  if (sim) sim.stop();
  sim = d3.forceSimulation(shown)
    .force("link", d3.forceLink(links).id(d => d.id).distance(55).strength(l => Math.min(1, l.weight / 80)))
    .force("charge", d3.forceManyBody().strength(-140))
    .force("center", d3.forceCenter(W() / 2, H() / 2))
    .force("collide", d3.forceCollide(d => rScale(d[sizeBy]) + 2));

  const link = linkG.selectAll("line").data(links, l => l.source.id ? l.source.id + "|" + l.target.id : l.source + "|" + l.target)
    .join("line")
    .attr("stroke", "#3a4250").attr("stroke-opacity", 0.45)
    .attr("stroke-width", l => wScale(l.weight));

  const node = nodeG.selectAll("circle").data(shown, d => d.id)
    .join("circle")
    .attr("r", d => rScale(d[sizeBy]))
    .attr("fill", d => TOPIC_COLORS[d.topic] || "#999")
    .attr("stroke", "#0c0e12").attr("stroke-width", 1)
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("mousemove", (e, d) => {
      tooltip.style("display", "block")
        .style("left", (e.clientX + 14) + "px").style("top", (e.clientY + 6) + "px")
        .html(`<b>#${d.id}</b><br>${d.count.toLocaleString()} videos · median ${fmt(d.median_views)} views<br>total ${fmt(d.total_views)} views · ${d.topic.replaceAll("_", " ")}`);
    })
    .on("mouseout", () => tooltip.style("display", "none"))
    .on("click", (e, d) => { e.stopPropagation(); select(d, links, node, link, label); });

  const label = labelG.selectAll("text").data(shown.filter(d => rScale(d[sizeBy]) > 8), d => d.id)
    .join("text")
    .text(d => d.id)
    .attr("font-size", 10).attr("fill", "#cfd6e0")
    .attr("text-anchor", "middle").attr("pointer-events", "none")
    .attr("paint-order", "stroke").attr("stroke", "#111419").attr("stroke-width", 3);

  svg.on("click", () => select(null, links, node, link, label));

  sim.on("tick", () => {
    link.attr("x1", l => l.source.x).attr("y1", l => l.source.y)
        .attr("x2", l => l.target.x).attr("y2", l => l.target.y);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y - rScale(d[sizeBy]) - 3);
  });

  if (selected) {
    const again = shown.find(d => d.id === selected.id);
    select(again || null, links, node, link, label);
  }
}

function select(d, links, node, link, label) {
  selected = d;
  const detail = d3.select("#detail");
  if (!d) {
    node.attr("opacity", 1); link.attr("stroke-opacity", 0.45); label.attr("opacity", 1);
    detail.html('<div class="stat" style="margin-top:4px">Click a hashtag to inspect its neighbourhood.</div>');
    return;
  }
  const neigh = new Map();
  links.forEach(l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    if (s === d.id) neigh.set(t, l.weight);
    if (t === d.id) neigh.set(s, l.weight);
  });
  node.attr("opacity", n => n.id === d.id || neigh.has(n.id) ? 1 : 0.08);
  label.attr("opacity", n => n.id === d.id || neigh.has(n.id) ? 1 : 0.05);
  link.attr("stroke-opacity", l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    return s === d.id || t === d.id ? 0.85 : 0.03;
  }).attr("stroke", l => {
    const s = l.source.id || l.source, t = l.target.id || l.target;
    return s === d.id || t === d.id ? (TOPIC_COLORS[d.topic] || "#999") : "#3a4250";
  });

  const top = [...neigh.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);
  detail.html(`<h2>#${d.id}</h2>
    <div class="stat"><b>${d.count.toLocaleString()}</b> videos use this tag</div>
    <div class="stat">median <b>${fmt(d.median_views)}</b> · total <b>${fmt(d.total_views)}</b> views</div>
    <div class="stat">dominant topic: <b>${d.topic.replaceAll("_", " ")}</b></div>
    <div class="stat" style="margin-top:8px">Top co-occurring tags:</div>
    <div id="neigh">${top.map(([t, w]) => `<div data-tag="${t}">#${t} <span>(${w}× together)</span></div>`).join("")}</div>`);
  detail.selectAll("#neigh div").on("click", function () {
    const tag = this.dataset.tag;
    const n = nodeG.selectAll("circle").data().find(x => x.id === tag);
    if (n) select(n, links, node, link, label);
  });
}

d3.select("#wmin").on("input", update);
d3.select("#sizeBy").on("change", update);
d3.select("#reset").on("click", () => {
  activeTopics.clear(); topics.forEach(t => activeTopics.add(t));
  d3.selectAll("#legend div").classed("off", false);
  d3.select("#wmin").property("value", 25);
  selected = null;
  update();
});

update();
</script>
</body>
</html>
